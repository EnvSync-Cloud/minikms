services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: minikms_test
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: minikms_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minikms_test -d minikms_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
