name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run tests with coverage
        run: make cover
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 50% threshold"
            exit 1
          fi
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build binary
        run: make build
      - name: Build Docker image
        run: make docker

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: minikms_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: minikms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minikms_test -d minikms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run migrations
        env:
          MINIKMS_DB_URL: postgres://minikms_test:testpass@localhost:5432/minikms_test?sslmode=disable
        run: psql "$MINIKMS_DB_URL" -f migrations/001_initial_schema.sql
      - name: Run E2E tests
        env:
          MINIKMS_DB_URL: postgres://minikms_test:testpass@localhost:5432/minikms_test?sslmode=disable
          MINIKMS_REDIS_URL: redis://localhost:6379/0
          MINIKMS_ROOT_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        run: go test ./internal/store/... ./internal/service/... -tags=e2e -v -race -count=1
